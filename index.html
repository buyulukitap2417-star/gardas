<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.A.R.D.A.Ş // Master Control Hub</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2092/2092663.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --neon-glow: rgba(255, 0, 60, 0.5);
            --bg-black: #020202;
            --glass: rgba(10, 2, 2, 0.95);
        }

        body {
            background-color: var(--bg-black);
            color: #e2e2e2;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 0, 60, 0.1) 0%, transparent 80%),
                linear-gradient(rgba(255, 0, 60, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 60, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
            animation: gridPulse 4s ease-in-out infinite;
        }

        @keyframes gridPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }

        /* Compact Auth Overlay */
        #authOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(40px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s ease;
        }

        .auth-card {
            border: 1px solid var(--neon-red);
            padding: 30px;
            border-radius: 24px;
            background: var(--glass);
            text-align: center;
            box-shadow: 0 0 50px var(--neon-glow);
            width: 340px;
        }

        /* Ring System */
        .ring-master {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s ease;
        }

        .ring { position: absolute; border-radius: 50%; border: 1px solid var(--neon-red); }
        .r-outer { width: 100%; height: 100%; border-style: dashed; animation: rotateCW 30s linear infinite; opacity: 0.2; }
        .r-mid { width: 85%; height: 85%; border-width: 3px; border-left-color: transparent; border-right-color: transparent; animation: rotateCCW 15s linear infinite; opacity: 0.4; }
        .r-inner { width: 70%; height: 70%; border-style: dotted; animation: rotateCW 8s linear infinite; opacity: 0.7; }
        .r-core { width: 55%; height: 55%; border: 2px solid var(--neon-red); box-shadow: inset 0 0 30px var(--neon-glow); }

        @keyframes rotateCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotateCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

        .is-listening .r-mid { border-color: #fff; box-shadow: 0 0 40px #fff; }
        .is-speaking .r-inner { transform: scale(1.1); box-shadow: 0 0 60px var(--neon-red); }

        /* Panels */
        .side-panel {
            position: fixed;
            top: 20px;
            bottom: 20px;
            width: 280px;
            background: var(--glass);
            border: 1px solid rgba(255, 0, 60, 0.2);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .left-p { left: 20px; }
        .right-p { right: 20px; }

        #chatPanel {
            position: fixed;
            inset: 0;
            background: rgba(2, 0, 0, 0.98);
            z-index: 500;
            transform: translateY(100%);
            transition: transform 0.5s ease-in-out;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .chat-open #chatPanel { transform: translateY(0); }
        .chat-log { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .msg { margin-bottom: 15px; max-width: 85%; font-size: 14px; }
        .msg-garda { border-left: 4px solid var(--neon-red); background: rgba(255,0,60,0.08); padding: 10px; border-radius: 0 12px 12px 12px; }
        .msg-user { margin-left: auto; border-right: 4px solid #fff; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px 0 12px 12px; text-align: right; }

        .btn-main {
            background: var(--neon-red);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
        }

        .btn-main:hover { box-shadow: 0 0 20px var(--neon-glow); }

        .voice-btn {
            background: rgba(255, 0, 60, 0.05);
            border: 1px solid rgba(255, 0, 60, 0.15);
            padding: 8px;
            border-radius: 8px;
            font-size: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            color: #aaa;
        }

        .voice-btn.active {
            background: var(--neon-red);
            color: white;
            border-color: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        /* Hacker Prank */
        #hackerOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f00;
            font-family: monospace;
            text-align: center;
        }

        .fake-notif {
            position: absolute;
            background: #111;
            border: 1px solid #f00;
            padding: 8px;
            font-size: 10px;
            color: #f00;
            box-shadow: 5px 5px 0 #300;
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch { 0% { transform: translate(0); } 50% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }

        #bioScreen {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.98);
            border-radius: 24px;
            z-index: 1001;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scanner-line {
            width: 100%;
            height: 2px;
            background: var(--neon-red);
            position: absolute;
            animation: scanMove 2s linear infinite;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

    </style>
</head>
<body class="chat-closed">

    <div class="grid-bg"></div>

    <!-- HACKER PRANK -->
    <div id="hackerOverlay">
        <h1 class="text-5xl font-black mb-4 orbitron animate-pulse">SİSTEM HACKLENDİ</h1>
        <p class="text-xl mb-12">VERİLER SIZDIRILIYOR: 100% ...</p>
        <div id="notifArea" class="relative w-full h-48 overflow-hidden"></div>
        <button onclick="cleanSystem()" class="btn-main px-12 py-5 text-xl">SİSTEMİ TEMİZLE (BAŞIM ÜSTÜNE)</button>
    </div>

    <!-- AUTH -->
    <div id="authOverlay">
        <div class="auth-card relative overflow-hidden">
            <div id="bioScreen">
                <div class="scanner-line"></div>
                <svg class="w-16 h-16 fill-[#ff003c] animate-pulse mb-4" viewBox="0 0 24 24"><path d="M12 1c-5.11 0-9.27 4.16-9.27 9.27 0 2.89 1.34 5.48 3.44 7.21.2.16.24.45.08.65-.16.2-.45.24-.65.08-2.38-1.96-3.87-4.91-3.87-8.21 0-5.67 4.6-10.27 10.27-10.27s10.27 4.6 10.27 10.27c0 3.3-1.49 6.25-3.87 8.21-.2.16-.49.12-.65-.08-.16-.2-.12-.49.08-.65 2.1-1.73 3.44-4.32 3.44-7.21 0-5.11-4.16-9.27-9.27-9.27z"/></svg>
                <p class="orbitron text-[10px] text-red-500 tracking-[5px] font-bold">DNA TARANIYOR...</p>
            </div>
            <h1 class="orbitron text-red-500 text-3xl mb-8 tracking-[8px] font-black">G.A.R.D.A.Ş</h1>
            <input type="password" id="passInput" placeholder="ŞİFREYİ GİR..." class="bg-black border border-red-500/30 w-full mb-6 p-2 text-center text-xl tracking-[4px] rounded-lg text-white">
            <button onclick="checkPass()" class="btn-main w-full orbitron mb-6">SİSTEME ERİŞ</button>
            <button onclick="startBio()" class="text-[9px] orbitron opacity-50 hover:opacity-100 transition uppercase font-bold tracking-widest">BİYOMETRİK GEÇİŞ</button>
        </div>
    </div>

    <!-- LEFT PANEL -->
    <div class="side-panel left-p">
        <h2 class="orbitron text-[11px] text-red-500 font-bold border-b border-red-500/20 pb-2">GÜVENLİK</h2>
        <div class="space-y-3">
            <div class="bg-red-950/20 p-3 rounded-xl border border-red-500/10">
                <p class="text-[9px] opacity-60 uppercase font-bold">Dinamik Yol</p>
                <p class="text-[10px] text-red-500 orbitron truncate" id="dynamicPath">/SEC/INIT</p>
            </div>
            <div class="bg-red-950/20 p-3 rounded-xl border border-red-500/10">
                <p class="text-[9px] opacity-60 uppercase font-bold">Model</p>
                <p class="text-[10px] text-red-500 orbitron">3.1-LITE-GA</p>
            </div>
        </div>
        <h2 class="orbitron text-[11px] text-red-500 font-bold border-b border-red-500/20 pb-2 mt-2">KARAKTERLER</h2>
        <div class="grid grid-cols-2 gap-2" id="voiceProfiles">
            <div class="voice-btn active" onclick="setProfile('agir')">AĞIR ABİ</div>
            <div class="voice-btn" onclick="setProfile('genc')">GENÇ KAN</div>
            <div class="voice-btn" onclick="setProfile('bilge')">BİLGE</div>
            <div class="voice-btn" onclick="setProfile('sert')">SERT</div>
            <div class="voice-btn" onclick="setProfile('robot')">ROBOTİK</div>
        </div>
    </div>

    <!-- CENTER RING -->
    <div class="flex flex-col items-center gap-8">
        <div class="ring-master" id="masterRing">
            <div class="ring r-outer"></div>
            <div class="ring r-mid"></div>
            <div class="ring r-inner"></div>
            <div class="ring r-core flex items-center justify-center">
                <h1 class="orbitron text-4xl font-black text-red-500" style="text-shadow: 0 0 20px var(--neon-glow);">G.A.R.D.A.Ş</h1>
            </div>
        </div>
        <div class="flex flex-col items-center gap-4">
            <button id="micBtn" onclick="toggleMic()" class="w-20 h-20 rounded-full border-4 border-red-500 flex items-center justify-center group hover:bg-red-500/20 transition shadow-[0_0_20px_var(--neon-glow)]">
                <svg class="w-10 h-10 fill-red-500" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <p id="micText" class="orbitron text-[10px] tracking-[4px] text-red-500 font-bold uppercase">SİSTEM DİNLEMEDE</p>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="side-panel right-p">
        <h2 class="orbitron text-[11px] text-red-500 font-bold border-b border-red-500/30 pb-2">TEŞHİS</h2>
        <div id="diagFeed" class="text-[9px] font-mono opacity-40 h-20 overflow-hidden"></div>
        <h2 class="orbitron text-[11px] text-red-500 font-bold border-b border-red-500/30 pb-2 mt-2">HATA AYIKLAMA</h2>
        <div id="errorLog" class="bg-red-950/20 p-3 rounded-xl border border-red-500/20 flex-grow overflow-y-auto text-[10px] font-mono text-red-400">
            <p class="opacity-30 italic">Arıza yok.</p>
        </div>
        <button onclick="toggleChat()" class="btn-main text-[10px] py-3 mt-2">TERMİNAL</button>
    </div>

    <!-- TERMINAL PANEL -->
    <div id="chatPanel">
        <div class="flex items-center justify-between border-b border-red-500/40 pb-6 mb-6">
            <h2 class="orbitron text-2xl text-red-500 font-black">LOG // STREAM_GA</h2>
            <button onclick="toggleChat()" class="text-[10px] orbitron border border-red-500/40 px-3 py-1">[ KAPAT ]</button>
        </div>
        <div class="chat-log" id="chatArea"></div>
        <div class="mt-6 flex gap-4 bg-black p-4 rounded-xl border border-red-500/20">
            <input type="text" id="userInput" placeholder="Yaz..." class="flex-grow bg-transparent outline-none text-red-500 font-bold">
            <button onclick="sendText()" class="btn-main px-6">EXEC</button>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyDbQwNPfb0zpCruxbRmkXL_g2L_wDMKYdw";
        const PASS = "KanGardaşı";
        const MODEL = "gemini-3.1-flash-lite";

        let isListening = false;
        let selectedProfile = 'agir';
        const profiles = {
            agir: { pitch: 0.7, rate: 0.85, text: "Gardaşın Ağır Abi modunda emrinde." },
            genc: { pitch: 1.15, rate: 1.1, text: "Genç Kan aktif, konuş gardaşım!" },
            bilge: { pitch: 0.9, rate: 0.75, text: "Bilge moduyla sistemler dengelendi." },
            sert: { pitch: 0.55, rate: 1.0, text: "Sert mod, emirlerini bekliyorum." },
            robot: { pitch: 1.5, rate: 1.25, text: "Robotik analiz birimi devrede." }
        };

        // AUTH
        function startBio() {
            document.getElementById('bioScreen').style.display = 'flex';
            setTimeout(() => { document.getElementById('bioScreen').style.display = 'none'; unlockSystem(); }, 2000);
        }

        function checkPass() {
            if(document.getElementById('passInput').value === PASS) unlockSystem();
            else logError("GEÇERSİZ ŞİFRE: Erişim reddedildi.");
        }

        function unlockSystem() {
            document.getElementById('authOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('authOverlay').style.display = 'none';
                speak("Selamın aleyküm gardaşım. G.A.R.D.A.Ş emrinde.");
                startVirusTimer();
            }, 800);
        }

        function toggleChat() { document.body.classList.toggle('chat-open'); }

        function setProfile(p) {
            selectedProfile = p;
            document.querySelectorAll('.voice-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            logError(`INFO: Karakter: ${p.toUpperCase()}`);
            speak(profiles[p].text);
        }

        // PRANK VIRUS
        function startVirusTimer() {
            setInterval(() => {
                const overlay = document.getElementById('hackerOverlay');
                const area = document.getElementById('notifArea');
                overlay.style.display = 'flex';
                area.innerHTML = '';
                for(let i=0; i<10; i++) {
                    setTimeout(() => {
                        const d = document.createElement('div');
                        d.className = 'fake-notif';
                        d.style.left = Math.random() * 80 + '%';
                        d.style.top = Math.random() * 80 + '%';
                        d.innerText = `FATAL ERROR: BufferOverflow_${Math.floor(Math.random()*999)} - Data Leaked!`;
                        area.appendChild(d);
                    }, i * 200);
                }
            }, 60000);
        }

        function cleanSystem() {
            document.getElementById('hackerOverlay').style.display = 'none';
            logError("INFO: Virüsler delikanlı gibi temizlendi.");
            speak("Sıkıntı yok gardaşım, hepsini hallettim.");
        }

        // SPEECH
        const recognition = 'webkitSpeechRecognition' in window ? new webkitSpeechRecognition() : null;
        if(recognition) {
            recognition.lang = 'tr-TR';
            recognition.onstart = () => {
                isListening = true;
                document.getElementById('masterRing').classList.add('is-listening');
                document.getElementById('micText').innerText = "DİNLENİYOR...";
            };
            recognition.onend = () => {
                isListening = false;
                document.getElementById('masterRing').classList.remove('is-listening');
                document.getElementById('micText').innerText = "SİSTEM DİNLEMEDE";
            };
            recognition.onresult = (e) => processInput(e.results[0][0].transcript);
        }

        function toggleMic() {
            if(!recognition) return logError("Ses tanıma desteklenmiyor.");
            if(isListening) recognition.stop(); else recognition.start();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text.replace(/[*#_]/g, ''));
            const vs = window.speechSynthesis.getVoices().filter(v => v.lang.includes('tr'));
            if(vs.length > 0) u.voice = vs[0];
            u.pitch = profiles[selectedProfile].pitch;
            u.rate = profiles[selectedProfile].rate;
            u.onstart = () => document.getElementById('masterRing').classList.add('is-speaking');
            u.onend = () => document.getElementById('masterRing').classList.remove('is-speaking');
            window.speechSynthesis.speak(u);
        }

        // AI CORE
        async function processInput(text) {
            addMsg('user', text);
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: "Sen GARDAŞ AI'sın. Anadolu delikanlısı gibi konuş. Kısa ve samimi ol." }] },
                        generationConfig: { maxOutputTokens: 100, temperature: 0.7 }
                    })
                });

                if(!response.ok) {
                    const errorJson = await response.json();
                    throw new Error(errorJson.error?.message || "API Hatası");
                }

                const data = await response.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Anlayamadım gardaşım.";
                addMsg('garda', reply);
                speak(reply);
            } catch (err) { 
                logError(err.message); 
                addMsg('garda', "Hata oluştu gardaşım. Sağdaki panele bir bak hele.");
            }
        }

        function addMsg(type, text) {
            const a = document.getElementById('chatArea');
            const d = document.createElement('div');
            d.className = `msg msg-${type}`;
            d.innerHTML = `<p class="orbitron text-[9px] opacity-40 font-bold">${type.toUpperCase()}</p><p>${text}</p>`;
            a.appendChild(d);
            a.scrollTop = a.scrollHeight;
        }

        function sendText() {
            const i = document.getElementById('userInput');
            if(!i.value.trim()) return;
            processInput(i.value);
            i.value = '';
        }

        function logError(msg) {
            const l = document.getElementById('errorLog');
            if(l.querySelector('.italic')) l.innerHTML = '';
            const p = document.createElement('p');
            p.innerHTML = `<span class="opacity-50">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            l.prepend(p);
        }

        // ANIMATIONS
        setInterval(() => {
            const h = Math.random().toString(36).substring(2, 10).toUpperCase();
            document.getElementById('dynamicPath').innerText = `/SEC/${h}`;
        }, 1000);

        setInterval(() => {
            const p = document.createElement('p');
            p.innerText = `> PKT_CHECK_${Math.floor(Math.random()*99)}: OK`;
            const f = document.getElementById('diagFeed');
            f.prepend(p); if(f.children.length > 5) f.lastChild.remove();
        }, 2000);

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendText(); });
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
