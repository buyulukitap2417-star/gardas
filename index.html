<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.A.R.D.A.Ş // Sesli Komuta Merkezi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --dark-red: #2a000a;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Arka Plan Grid Animasyonu */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 0, 60, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 60, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.3;
        }

        /* Ana Halka Sistemi */
        .ring-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .center-text {
            position: absolute;
            z-index: 10;
            text-shadow: 0 0 20px var(--neon-red);
            letter-spacing: 5px;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--neon-red);
            transition: all 0.5s ease;
        }

        .ring-outer {
            width: 100%;
            height: 100%;
            border-style: dashed;
            animation: rotate-cw 20s linear infinite;
            opacity: 0.3;
        }

        .ring-middle {
            width: 85%;
            height: 85%;
            border-width: 4px;
            border-left-color: transparent;
            border-right-color: transparent;
            animation: rotate-ccw 10s linear infinite;
            opacity: 0.6;
        }

        .ring-inner {
            width: 70%;
            height: 70%;
            border-style: dotted;
            animation: rotate-cw 5s linear infinite;
        }

        @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

        /* Konuşma Efekti */
        .is-listening .ring-middle {
            border-color: #fff;
            box-shadow: 0 0 30px #fff;
            animation-duration: 2s;
        }

        .is-speaking .ring-inner {
            transform: scale(1.1);
            border-color: var(--neon-red);
            box-shadow: 0 0 50px var(--neon-red);
            animation-duration: 1s;
        }

        /* Panel Geçişleri */
        .view-chat .ring-container {
            transform: scale(0.4) translateX(-100%);
            opacity: 0.5;
        }

        .view-chat .chat-panel {
            transform: translateX(0);
            opacity: 1;
        }

        .chat-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 450px;
            height: 100%;
            background: rgba(10, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--neon-red);
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        /* HUD Elemanları */
        .hud-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 50;
        }

        .hud-stat {
            border-left: 2px solid var(--neon-red);
            padding-left: 10px;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }

        /* Butonlar */
        .toggle-chat-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            border: 1px solid var(--neon-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 110;
            background: rgba(255, 0, 61, 0.1);
            transition: 0.3s;
        }

        .toggle-chat-btn:hover { background: var(--neon-red); box-shadow: 0 0 20px var(--neon-red); }

        .mic-trigger {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            z-index: 110;
            text-align: center;
        }

        /* Auth */
        #authOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            text-align: center;
            border: 1px solid var(--neon-red);
            padding: 50px;
            border-radius: 30px;
            background: rgba(10, 0, 0, 0.8);
        }

        input[type="password"], input[type="text"] {
            background: #000;
            border: 1px solid var(--neon-red);
            padding: 10px;
            color: #fff;
            outline: none;
            text-align: center;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="grid-bg"></div>

    <!-- Güvenlik Katmanı -->
    <div id="authOverlay">
        <div class="auth-box">
            <h1 class="orbitron text-red-500 text-3xl mb-8 tracking-[10px]">G.A.R.D.A.Ş</h1>
            <input type="password" id="passInput" placeholder="GEÇİŞ ANAHTARI..." class="w-full mb-6 orbitron">
            <button onclick="unlock()" class="w-full bg-red-600 py-3 orbitron font-bold hover:bg-red-500 transition">SİSTEMİ AÇ</button>
        </div>
    </div>

    <!-- Üst HUD -->
    <div class="hud-top orbitron">
        <div class="hud-stat">
            <p>MODEL</p>
            <p class="text-white font-bold">3.1-FLASH-LITE</p>
        </div>
        <div class="hud-stat">
            <p>STATUS</p>
            <p class="text-green-500 font-bold" id="sysStatus">STABİL</p>
        </div>
        <div class="hud-stat">
            <p>VOICE</p>
            <p class="text-blue-500 font-bold" id="voiceName">TURKISH_MALE</p>
        </div>
    </div>

    <!-- Ana Sesli Görüşme Halkası -->
    <div class="ring-container" id="mainRing">
        <div class="ring ring-outer"></div>
        <div class="ring ring-middle"></div>
        <div class="ring ring-inner"></div>
        <h1 class="center-text orbitron text-5xl font-black">G.A.R.D.A.Ş</h1>
    </div>

    <!-- Mikrofon Tetikleyici -->
    <div class="mic-trigger" onclick="toggleListening()">
        <div id="micIcon" class="w-20 h-20 rounded-full border-2 border-red-500 flex items-center justify-center mb-2 hover:bg-red-500/20 transition">
            <svg class="w-10 h-10 fill-current" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </div>
        <p class="orbitron text-[10px] tracking-widest text-red-500" id="micText">DİNLEMEK İÇİN BAS</p>
    </div>

    <!-- Sohbet Paneli (Yazılı) -->
    <div class="chat-panel" id="chatPanel">
        <div class="p-6 border-b border-red-500/30">
            <h2 class="orbitron text-red-500 font-bold">TERMINAL // LOGS</h2>
        </div>
        <div class="flex-grow overflow-y-auto p-6 space-y-4" id="chatLog"></div>
        <div class="p-6 border-t border-red-500/30 flex gap-2">
            <input type="text" id="userInput" placeholder="KOMUT YAZIN..." class="flex-grow text-sm">
            <button onclick="handleTextSend()" class="bg-red-600 px-4 py-2 font-bold orbitron text-xs">GÖNDER</button>
        </div>
    </div>

    <!-- Geçiş Butonu -->
    <div class="toggle-chat-btn" onclick="toggleView()" title="Yazılı Sohbet">
        <svg class="w-6 h-6 fill-white" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>

    <script>
        const apiKey = "AIzaSyDbQwNPfb0zpCruxbRmkXL_g2L_wDMKYdw";
        const STRICT_MODEL = "gemini-3.1-flash-lite";
        const PASS = "KanGardaşı";

        let isChatOpen = false;
        let isListening = false;
        let selectedVoice = null;

        // Ses Tanıma Hazırlığı
        const recognition = 'webkitSpeechRecognition' in window ? new webkitSpeechRecognition() : null;
        if(recognition) {
            recognition.lang = 'tr-TR';
            recognition.onstart = () => setMicState(true);
            recognition.onend = () => setMicState(false);
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                processInput(text);
            };
        }

        function setMicState(active) {
            isListening = active;
            const ring = document.getElementById('mainRing');
            const micIcon = document.getElementById('micIcon');
            const micText = document.getElementById('micText');

            if(active) {
                ring.classList.add('is-listening');
                micIcon.classList.add('bg-red-600');
                micText.innerText = "DİNLENİYOR...";
            } else {
                ring.classList.remove('is-listening');
                micIcon.classList.remove('bg-red-600');
                micText.innerText = "DİNLEMEK İÇİN BAS";
            }
        }

        function toggleListening() {
            if(!recognition) return alert("Tarayıcın ses tanımayı desteklemiyor gardaşım.");
            if(isListening) recognition.stop();
            else recognition.start();
        }

        // Ses Sentezi (TTS)
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#_]/g, ''));
            utterance.lang = 'tr-TR';
            utterance.pitch = 0.8; // Daha kalın/delikanlı ses
            utterance.rate = 1.0;
            
            const voices = window.speechSynthesis.getVoices();
            const trVoice = voices.find(v => v.lang.includes('tr')) || voices[0];
            if(trVoice) utterance.voice = trVoice;

            utterance.onstart = () => document.getElementById('mainRing').classList.add('is-speaking');
            utterance.onend = () => document.getElementById('mainRing').classList.remove('is-speaking');
            
            window.speechSynthesis.speak(utterance);
        }

        // Gemini API İletişimi
        async function processInput(text) {
            addLog('user', text);
            document.getElementById('sysStatus').innerText = "İŞLENİYOR";

            const systemPrompt = "Sen GARDAŞ isimli bir yapay zekasın. JARVIS gibi bir asistan ama Anadolu delikanlısı gibi konuşuyorsun. Kullanıcıya 'Gardaşım' diye hitap et. Mert, dürüst ve kısa öz cevaplar ver.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${STRICT_MODEL}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const data = await response.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Veri yolunda bir engel var gardaşım.";
                
                addLog('garda', reply);
                speak(reply);
                document.getElementById('sysStatus').innerText = "STABİL";

            } catch (err) {
                console.error(err);
                document.getElementById('sysStatus').innerText = "HATA";
            }
        }

        function addLog(type, text) {
            const log = document.getElementById('chatLog');
            const div = document.createElement('div');
            div.className = `p-3 rounded-lg ${type === 'garda' ? 'bg-red-950/30 border-l-2 border-red-500' : 'bg-white/5 border-r-2 border-gray-500 text-right'}`;
            div.innerHTML = `<p class="text-[9px] orbitron opacity-50 mb-1">${type.toUpperCase()}</p><p class="text-sm">${text}</p>`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function handleTextSend() {
            const input = document.getElementById('userInput');
            if(!input.value.trim()) return;
            processInput(input.value);
            input.value = '';
        }

        function toggleView() {
            isChatOpen = !isChatOpen;
            document.body.classList.toggle('view-chat', isChatOpen);
        }

        function unlock() {
            if(document.getElementById('passInput').value === PASS) {
                document.getElementById('authOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('authOverlay').style.display = 'none';
                    speak("Gardaşım sisteme hoş geldin. Her şey yolunda, emret ne yapıyoruz?");
                }, 800);
            }
        }

        // Voice init
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
